<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Квиз для именинницы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="bg-glow bg-glow-a"></div>
  <div class="bg-glow bg-glow-b"></div>
  <div class="side-ribbon side-ribbon-left" aria-hidden="true">
    
    
    <span class="side-ribbon__emoji side-ribbon__emoji--l1">🐱</span>
    <span class="side-ribbon__emoji side-ribbon__emoji--l2">🎻</span>
    <span class="side-ribbon__emoji side-ribbon__emoji--l3">💗</span>
    <span class="side-ribbon__emoji side-ribbon__emoji--l4">🐈</span>
    <span class="side-ribbon__emoji side-ribbon__emoji--l5">🎵</span>
    <span class="side-ribbon__glyph side-ribbon__glyph--l1">♪</span>
    <span class="side-ribbon__glyph side-ribbon__glyph--l2">💓</span>
    <span class="side-ribbon__dot side-ribbon__dot--la"></span>
    <span class="side-ribbon__dot side-ribbon__dot--lb"></span>
    <span class="side-ribbon__emoji side-ribbon__emoji--l6">🎸</span>
  </div>
  <div class="side-ribbon side-ribbon-right" aria-hidden="true">
    
    
    <span class="side-ribbon__emoji side-ribbon__emoji--r1">🐈</span>
    <span class="side-ribbon__emoji side-ribbon__emoji--r2">🎺</span>
    <span class="side-ribbon__emoji side-ribbon__emoji--r3">🎶</span>
    <span class="side-ribbon__emoji side-ribbon__emoji--r4">🐱</span>
    <span class="side-ribbon__emoji side-ribbon__emoji--r5">🎷</span>
    <span class="side-ribbon__glyph side-ribbon__glyph--r1">♫</span>
    <span class="side-ribbon__glyph side-ribbon__glyph--r2">💕</span>
    <span class="side-ribbon__dot side-ribbon__dot--ra"></span>
    <span class="side-ribbon__dot side-ribbon__dot--rb"></span>
    <span class="side-ribbon__emoji side-ribbon__emoji--r6">🎻</span>
  </div>
  <main class="app">
    <section id="setup-screen" class="card">
      <h1>Квиз для именинницы</h1>
      <p class="subtitle">Введите названия 3 команд и начните игру</p>
      <form id="teams-form" class="teams-form">
        <label>
          Команда 1
          <input type="text" name="team1" required maxlength="24">
        </label>
        <label>
          Команда 2
          <input type="text" name="team2" required maxlength="24">
        </label>
        <label>
          Команда 3
          <input type="text" name="team3" required maxlength="24">
        </label>
        <button type="submit" class="btn-primary">Начать игру</button>
      </form>
    </section>

    <section id="game-screen" class="hidden">
      <header class="top-bar">
        <span class="top-bar-side" aria-hidden="true"></span>
        <h2 class="game-title">Квиз для Жени</h2>
        <div class="top-bar-actions">
          <button id="finish-btn" class="btn-secondary" type="button">Завершить игру</button>
        </div>
      </header>

      <div id="scoreboard" class="scoreboard"></div>

      <div id="board" class="board"></div>
    </section>
  </main>

  <div id="question-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content card question-content">
      <h3 id="modal-category"></h3>
      <p id="modal-question" class="question-text"></p>
      <ul id="modal-options" class="options"></ul>
      <div class="actions">
        <label class="team-select-wrap">
          Команда отвечает:
          <div class="custom-select-container">
            <select id="answer-team"></select>
          </div>
        </label>
        <p id="answer-status" class="answer-status hidden"></p>
        <div id="manual-controls" class="action-buttons hidden">
          <button id="correct-btn" class="btn-primary" type="button">Ответ верный!</button>
          <button id="wrong-btn" class="btn-danger" type="button">Ответ неверный</button>
        </div>
      </div>
      <button id="close-modal-btn" class="btn-secondary close-btn" type="button">Закрыть</button>
    </div>
  </div>

  <div id="result-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content card result-content">
      <div class="party-burst burst-a"></div>
      <div class="party-burst burst-b"></div>
      <h3>Игра завершена</h3>
      <p class="winner-title">Победитель</p>
      <p id="winner-team-name" class="winner-team-name"></p>
      <p id="winner-text" class="winner-text"></p>
      <button id="restart-btn" class="btn-primary" type="button">Новая игра</button>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
